# ESCALATION_MATRIX v1 — Admin panelde konfigurasyon edilebilir
# Kural: Birden fazla risk_flag varsa en yuksek seviye (L3 > L2 > L1 > L0) kazanir.
# Ayni seviyede ise priority yuksek olan kazanir.
# Dedupe: dedupe_key = "<risk_flag>|<intent>|<reference_id_or_phone>"

# === L3 — Critical ===
- risk_flag: LEGAL_REQUEST
  level: L3
  route_to_role: ADMIN
  priority: high
  action: [handoff.create_ticket, notify.send]
  notify_channel: panel
  user_message_style: calm_premium
  reason_hint: "Hukuki talep / resmi surec"

