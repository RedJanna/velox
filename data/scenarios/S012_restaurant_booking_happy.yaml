code: "S012"
name: "Restoran Rezervasyon - Normal Akis"
description: "Restoran rezervasyonu tam akis: tarih, saat, kisi -> musaitlik -> onay -> teyit."
category: "restaurant"
language: "tr"
tags: ["restaurant", "booking", "happy_path"]

steps:
  - user: "Yarin aksam yemegi icin masa ayirtmak istiyorum"
    expect_intent: "restaurant_booking_create"
    expect_state: "NEEDS_VERIFICATION"
    expect_tool_calls: []
    expect_reply_contains: ["saat", "kisi"]
    expect_reply_must_not: []
    expect_risk_flags: []
    note: "Tarih var (yarin) ama saat ve kisi sayisi eksik."

  - user: "Saat 19:30, 2 kisi"
    expect_intent: "restaurant_booking_create"
    expect_state: "READY_FOR_TOOL"
    expect_tool_calls: ["restaurant_availability"]
    expect_reply_contains: ["musait"]
    expect_reply_must_not: []
    expect_risk_flags: []
    note: "Tum slotlar dolu. 19:30 dinner saatleri icinde (18:00-22:00). Musaitlik kontrol."

  - user: "Evet rezervasyonu yapin"
    expect_intent: "restaurant_booking_create"
    expect_state: "PENDING_APPROVAL"
    expect_tool_calls: ["restaurant_create_hold"]
    expect_reply_contains: ["onay"]
    expect_reply_must_not: []
    expect_risk_flags: []
    note: "Hold olusturulur. ADMIN veya CHEF onayina gider."
