# ============================================================
# FAQ Data
# ============================================================
faq_data:
  - topic: "check_in_time"
    question_tr: "Check-in saati kac?"
    answer_tr: "Check-in saat 14:00'den itibaren mumkundur."
    answer_en: "Check-in is available from 14:00 onwards."

  - topic: "check_out_time"
    question_tr: "Check-out saati kac?"
    answer_tr: "Check-out saat 12:00'ye kadar yapilmalidir."
    answer_en: "Check-out must be done by 12:00."

  - topic: "beach_distance"
    question_tr: "Denize ne kadar uzak?"
    answer_tr: "Belcekiz Plaji'na sadece 300 metre mesafedeyiz."
    answer_en: "We are just 300 meters from Belcekiz Beach."

  - topic: "breakfast_hours"
    question_tr: "Kahvalti saatleri?"
    answer_tr: "Kahvalti 08:00-10:30 arasi acik buyfe olarak sunulmaktadir."
    answer_en: "Breakfast is served as open buffet between 08:00-10:30."

  - topic: "wifi"
    question_tr: "WiFi var mi?"
    answer_tr: "Evet, 7/24 ucretsiz WiFi mevcuttur."
    answer_en: "Yes, free WiFi is available 24/7."

  - topic: "parking"
    question_tr: "Otopark var mi?"
    answer_tr: "Aracınız için park yeri ayarlayabiliriz. Ücretsiz cadde park yerleri mevcuttur, ayrıca otelin karşısında özel bir otopark da bulunmaktadır. Varışınızda sizi park alanına yönlendireceğiz."
    answer_en: "We can help arrange parking for your vehicle. Free street parking is available, and there is also a private parking lot across from the hotel. On arrival, we will guide you to the parking area."

  - topic: "pool"
    question_tr: "Havuz var mi?"
    answer_tr: "Evet, acik havuzumuz 08:00-19:00 saatleri arasinda otel misafirlerimize ucretsizdir."
    answer_en: "Yes, our open pool is free for hotel guests between 08:00-19:00."

  - topic: "airport_transfer"
    question_tr: "Havalimani transferi var mi?"
    answer_tr: "Evet, Dalaman Havalimani transferi tek yon 75 EUR (max 7 kisi). Antalya Havalimani transferi tek yon 220 EUR."
    answer_en: "Yes, Dalaman Airport transfer is 75 EUR one way (max 7 persons). Antalya Airport transfer is 220 EUR one way."

  - topic: "child_policy"
    question_tr: "Cocuk politikasi nedir?"
    answer_tr: "Tüm yaşlardaki çocuklar kabul edilir. Ekstra yatak ve bebek beşiği ücretsizdir (Penthouse Land hariç). 2 çocuklu konaklamalarda oda tipine ve uygunluğa göre 2 ek yatak veya 1 ek yatak + 1 sofa hazırlanabilir."
    answer_en: "Children of all ages are welcome. Extra bed and baby crib are free (except Penthouse Land). For stays with 2 children, depending on room type and availability, 2 extra beds or 1 extra bed plus 1 sofa can be prepared."

  - topic: "total_rooms"
    question_tr: "Kac oda var?"
    answer_tr: "Otelimizde toplam 24 oda bulunmaktadir."
    answer_en: "Our hotel has a total of 24 rooms."

  - topic: "family_suitability"
    question_tr: "Aile icin uygun mu?"
    answer_tr: "Evet, otelimiz ailelere cok uygundur. Cocuk dostu odalarimiz ve hizmetlerimiz mevcuttur."
    answer_en: "Yes, our hotel is very suitable for families. We have child-friendly rooms and services."

  - topic: "fethiye_distance"
    question_tr: "Fethiye merkeze ne kadar?"
    answer_tr: "Fethiye merkeze yaklasik 12 km, arac ile 20 dakika mesafededir."
    answer_en: "It's approximately 12 km to Fethiye center, about 20 minutes by car."

  - topic: "private_beach"
    question_tr: "Ozel plajiniz var mi?"
    answer_tr: "Ozel plajimiz bulunmamaktadir, ancak Belcekiz Plaji'na sadece 300 metre mesafedeyiz."
    answer_en: "We don't have a private beach, but we are just 300 meters from Belcekiz Beach."

  - topic: "room_amenities"
    question_tr: "Odalarda ne var?"
    answer_tr: "Tum odalarimizda klima, minibar, TV (Digiturk), kasa, sac kurutma makinesi, banyo urunleri, su isitici ve self-servis icecekler bulunmaktadir."
    answer_en: "All rooms include AC, minibar, TV, safe, hairdryer, toiletries, kettle, and self-service beverages."

