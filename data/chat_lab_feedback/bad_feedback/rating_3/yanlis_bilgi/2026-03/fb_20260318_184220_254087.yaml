gold_standard: 'Sigara içimine sadece açık teras bölümünde izin verilmektedir. Diğer misafirlerimizin rahatlığı ve konforu için sigara içmemenizi önemle tavsiye ederiz.


  English:

  Smoking is permitted in the open terrace area. For the comfort and convenience of our other guests, we kindly and strongly recommend refraining from smoking.


  Русский:

  Курение разрешено только в открытой зоне террасы. Ради комфорта и удобства других гостей мы настоятельно рекомендуем воздержаться от курения.


  العربية:

  يُسمح بالتدخين فقط في منطقة التراس المفتوحة. ومن أجل راحة ورفاهية ضيوفنا الآخرين، نوصي بشدة بالامتناع عن التدخين.


  中文:

  仅可在室外露台区域吸烟。为保障其他宾客的舒适与便利，我们诚挚建议您尽量不要吸烟。


  Español:

  Se permite fumar únicamente en la zona de la terraza al aire libre. Por la comodidad y el bienestar de nuestros demás huéspedes, le recomendamos encarecidamente no fumar.


  हिन्दी:

  धूम्रपान केवल खुले टैरेस क्षेत्र में ही अनुमत है। अन्य अतिथियों की सुविधा और आराम के लिए, हम आपसे विनम्रतापूर्वक धूम्रपान न करने का आग्रह करते हैं।


  Deutsch:

  Das Rauchen ist ausschließlich im offenen Terrassenbereich gestattet. Für den Komfort und das Wohlbefinden unserer anderen Gäste empfehlen wir Ihnen nachdrücklich, auf das Rauchen zu verzichten.


  Français:

  Il est permis de fumer uniquement dans l’espace terrasse extérieure. Pour le confort et le bien-être de nos autres clients, nous vous recommandons vivement de ne pas fumer.


  Português:

  É permitido fumar apenas na área da varanda externa. Para o conforto e o bem-estar dos demais hóspedes, recomendamos fortemente que evite fumar.'
