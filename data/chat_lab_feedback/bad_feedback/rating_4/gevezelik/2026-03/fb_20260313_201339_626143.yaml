input: 'Merhaba,


  20.08.2026 – 22.08.2026 tarihleri arasında konaklama için müsaitlik sormak istiyorum.

  Toplam 6 kişi olacağız:

  4 yetişkin

  2 çocuk (15 ve 13 yaşlarında)


  Bu tarihler için uygun oda veya aile odası var mı?

  Mümkünse fiyat bilgisi ve oda seçeneklerini de paylaşabilir misiniz?


  Teşekkür ederim.

  Işıl'
output: "Merhaba Işıl Hanım \U0001F33F  \n\n20.08.2026 – 22.08.2026 tarihleri için yaptığım ilk kontrolde, sistemimiz 6 kişi (4 yetişkin + 15 ve 13 yaş) konaklaması için fiyat teklifi oluşturamadı.\n\nOtelimizde tek bir odada maksimum kapasite **4 kişi** olduğu için, 6 kişilik konaklama için genellikle:\n\n• **2 oda kombinasyonu** (örneğin 2× Exclusive / 2× Premium vb.)  \nşeklinde planlama yapılmaktadır.\n\nSize en uygun ve ekonomik kombinasyonu net fiyatlarıyla birlikte sunabilmem için kısa bir teyit rica ediyorum:\n\n\U0001F449 6 kişi için **2 ayrı oda** şeklinde konaklama sizin için uygun mudur?  \n(Odaların yan yana olması talebiniz varsa da belirtebilirsiniz.)\n\nOnayınızla birlikte, uygun oda kombinasyonlarını ve her oda tipi için  \n**İptal edilemez** ve **Ücretsiz İptal** fiyat seçeneklerini detaylı olarak paylaşacağım.\n\nMemnuniyetle yardımcı olurum \U0001F338"
