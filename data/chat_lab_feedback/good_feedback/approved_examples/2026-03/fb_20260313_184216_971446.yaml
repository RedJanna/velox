input: 'Merhaba,


  20.08.2026 – 22.08.2026 tarihleri arasında konaklama için müsaitlik sormak istiyorum.

  Toplam 6 kişi olacağız:

  4 yetişkin

  2 çocuk (15 ve 13 yaşlarında)


  Bu tarihler için uygun oda veya aile odası var mı?

  Mümkünse fiyat bilgisi ve oda seçeneklerini de paylaşabilir misiniz?


  Teşekkür ederim.

  Işıl'
output: "Işıl Hanım merhaba \U0001F33F  \n\n20.08.2026 – 22.08.2026 (2 gece) tarihleri için  \n4 yetişkin + 2 çocuk (15 ve 13 yaş) konaklamanıza uygun müsaitliğimizi kontrol ettim.\n\nOtelimizde maksimum kapasite oda başı 4 kişidir.  \nBu nedenle 6 kişi için **tek bir aile odası** yerine **2 oda** planlamamız gerekmektedir.\n\nBu tarihlerde aşağıdaki oda tiplerimiz müsait görünmektedir:\n\n• Exclusive Pool  \n• Penthouse  \n• Exclusive Land  \n• Premium  \n\nSizin için en uygun kombinasyonu netleştirebilmem adına küçük bir bilgi rica edeceğim:\n\n\U0001F449 2 oda şeklinde konaklamayı kabul eder misiniz?  \n\U0001F449 Oda dağılımı nasıl olsun istersiniz? (Örn: 3+3 ya da 2+2+2 şeklinde bağlantılı oda talebi gibi)\n\nOnayınızla birlikte 4 yetişkin + 2 çocuk konfigürasyonuna göre toplam fiyatları (hem **İptal edilemez** hem **Ücretsiz İptal** seçenekleriyle birlikte) detaylı olarak paylaşacağım.\n\nMemnuniyetle yardımcı olurum \U0001F338"
