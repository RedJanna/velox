services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8011}:8001"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "velox.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--proxy-headers",
        "--forwarded-allow-ips=*",
      ]
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env.demo.local
    environment:
      PYTHONPATH: /app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-velox_demo}
      POSTGRES_USER: ${DB_USER:-velox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-demo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-velox} -d ${DB_NAME:-velox_demo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - pgdata_demo:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata_demo:/data
    restart: unless-stopped

volumes:
  pgdata_demo:
  redisdata_demo:
